<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehar & Akash</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background-color: #111; }
        .split { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 0.5s ease; position: relative; cursor: pointer; text-decoration: none; }
        .akash { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: #fff; }
        .mehar { background: linear-gradient(135deg, #2c3e50, #fd746c); color: #fff; }
        .split:hover { width: 55%; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); z-index: 1; }
        .content { z-index: 2; text-align: center; padding: 20px; }
        h1 { font-size: 3rem; margin-bottom: 10px; text-transform: uppercase; }
        p { font-size: 1.2rem; opacity: 0.8; font-style: italic; }
        .btn { margin-top: 20px; padding: 10px 25px; border: 2px solid #fff; background: transparent; color: #fff; border-radius: 30px; font-weight: bold; text-transform: uppercase; }
        @media(max-width: 768px) { body { flex-direction: column; } .split { width: 100%; height: 50%; } }
    </style>
</head>
<body>

    <div class="split akash" onclick="checkPassword('akash')">
        <div class="overlay"></div>
        <div class="content">
            <h1>Akash</h1>
            <p>Welcome to my space</p>
            <div class="btn">Explore Me</div>
        </div>
    </div>

    <div class="split mehar" onclick="checkPassword('mehar')">
        <div class="overlay"></div>
        <div class="content">
            <h1>Mehar</h1>
            <p>Welcome to my world</p>
            <div class="btn">Explore Me</div>
        </div>
    </div>

    <script>
        function checkPassword(section) {
            var password = prompt("Enter Secret Password:");
            if (password !== null) {
                // Real password '201304' ko Base64 me check kar raha hai taaki inspect me na dikhe
                if (btoa(password) === "MjAxMzA0") {
                    if (section === 'akash') window.location.href = "akash.html";
                    if (section === 'mehar') window.location.href = "mehar.html";
                } else {
                    alert("Wrong Password! ❌");
                }
            }
        }
    </script>

</body>
</html>
